<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智慧公車 GPS 報站 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, deleteDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // ==========================================
        // 配置區 (使用您的最新 API KEY)
        // ==========================================
        const geminiApiKey = "AIzaSyAhum5tOAh0QEHNzRmu82mrTgABri366ew"; 
        
        let firebaseConfig = {  
            apiKey: "AIzaSyAZIM0cr-uhBtGyYd7_ddmmLH41h0PxBro",
            authDomain: "busts-a64c2.firebaseapp.com",
            projectId: "busts-a64c2",
            storageBucket: "busts-a64c2.firebasestorage.app",
            messagingSenderId: "684162202156",
            appId: "1:684162202156:web:b868e5b8341dd1c683af89"
        };
        
        try { if (typeof __firebase_config !== 'undefined') firebaseConfig = JSON.parse(__firebase_config); } catch (e) {}

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'bus-pro-universal';

        // 核心狀態管理
        let allRoutes = JSON.parse(localStorage.getItem('bus_routes_v6')) || [];
        let currentRouteIdx = -1;
        let activeIdx = 0;
        let isTracking = false;
        let watchId = null;
        let lastAnnouncedType = ""; // 'next_i' or 'arrived_i'
        let hasWelcomed = false; 
        let syncCode = localStorage.getItem('bus_sync_v6') || "";
        let currentSpeed = 0;

        // 語音合成 (TTS)
        const speak = (text, lang) => {
            return new Promise((resolve) => {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = lang; 
                u.rate = 0.95; 
                u.onend = resolve;
                window.speechSynthesis.speak(u);
            });
        };

        const playDing = () => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.3);
        };

        // 報站邏輯
        window.announceNext = async () => {
            if (currentRouteIdx === -1) return;
            const route = allRoutes[currentRouteIdx];
            const s = route.stations[activeIdx];
            window.speechSynthesis.cancel();

            // 迎賓廣播 (第一站離站後觸發)
            if (activeIdx === 1 && !hasWelcomed) {
                await speak(`歡迎搭乘 ${route.name} 路線公車，祝您旅途愉快，一路平安。`, 'zh-TW');
                hasWelcomed = true;
                await new Promise(r => setTimeout(r, 1000));
            }

            await speak(`下一站`, 'zh-TW');
            await speak(s.name, 'zh-TW');
            if(s.enName) {
                await speak(`Next station`, 'en-US');
                await speak(s.enName, 'en-US');
            }
        };

        window.announceArrived = async () => {
            if (currentRouteIdx === -1) return;
            const s = allRoutes[currentRouteIdx].stations[activeIdx];
            window.speechSynthesis.cancel();
            playDing();
            await new Promise(r => setTimeout(r, 500));
            
            // [中文] 到了 Arrive at [英文]
            await speak(s.name, 'zh-TW');
            await speak(`到了`, 'zh-TW');
            if(s.enName) {
                await speak(`Arrive at`, 'en-US');
                await speak(s.enName, 'en-US');
            }
        };

        // GPS 與預估計算
        const getDistance = (lat1, lon1, lat2, lon2) => {
            const R = 6371e3, p = Math.PI/180;
            const a = 0.5 - Math.cos((lat2-lat1)*p)/2 + Math.cos(lat1*p)*Math.cos(lat2*p)*(1-Math.cos((lon2-lon1)*p))/2;
            return R * 2 * Math.asin(Math.sqrt(a));
        };

        const calcETA = (meters) => Math.ceil((meters / 1000) / 30 * 60);

        window.toggleGPS = () => {
            const btn = document.getElementById('gps-btn');
            if (!isTracking) {
                isTracking = true;
                btn.innerText = "停止自動報站";
                btn.classList.replace('bg-emerald-500', 'bg-red-500');
                watchId = navigator.geolocation.watchPosition(p => {
                    currentSpeed = Math.round((p.coords.speed || 0) * 3.6);
                    document.getElementById('dash-speed').innerText = currentSpeed;
                    updateGPSLogic(p.coords.latitude, p.coords.longitude);
                }, null, { enableHighAccuracy: true });
            } else {
                isTracking = false;
                btn.innerText = "啟動自動報站";
                btn.classList.replace('bg-red-500', 'bg-emerald-500');
                navigator.geolocation.clearWatch(watchId);
                document.getElementById('dash-speed').innerText = "0";
            }
        };

        const updateGPSLogic = (lat, lon) => {
            if (currentRouteIdx === -1) return;
            const route = allRoutes[currentRouteIdx];
            const target = route.stations[activeIdx];
            const dist = getDistance(lat, lon, target.lat, target.lng);
            
            updateDashboardUI(dist);

            // 到站：距離 60M
            if (dist < 60 && lastAnnouncedType !== 'arrived_' + activeIdx) {
                window.announceArrived();
                lastAnnouncedType = 'arrived_' + activeIdx;
            }

            // 下一站：已播到了，且離站 50M
            if (lastAnnouncedType === 'arrived_' + activeIdx && dist > 50) {
                if (activeIdx < route.stations.length - 1) {
                    activeIdx++;
                    lastAnnouncedType = 'next_' + activeIdx;
                    window.announceNext();
                    updateDashboardUI();
                }
            }
        };

        window.updateDashboardUI = (currentDist = null) => {
            if (currentRouteIdx === -1) return;
            const route = allRoutes[currentRouteIdx];
            const s = route.stations[activeIdx];
            
            document.getElementById('main-zh').innerText = s.name;
            document.getElementById('main-en').innerText = s.enName || "";
            document.getElementById('main-dist').innerText = currentDist ? Math.round(currentDist) : "--";

            let accumulatedMeters = currentDist || 0;
            const listContainer = document.getElementById('station-list');
            listContainer.innerHTML = route.stations.map((st, i) => {
                let status = "等待中";
                let color = "bg-white opacity-40 grayscale";
                if (i > activeIdx) {
                    accumulatedMeters += getDistance(route.stations[i-1].lat, route.stations[i-1].lng, st.lat, st.lng);
                    status = `預計 ${calcETA(accumulatedMeters)} 分`;
                    color = "bg-white border-slate-100 shadow-sm";
                } else if (i === activeIdx) {
                    status = "當前站點";
                    color = "bg-blue-50 border-blue-200 ring-2 ring-blue-50 shadow-md opacity-100";
                } else {
                    status = "已過站";
                }
                return `
                    <div onclick="jumpTo(${i})" class="p-3 sm:p-4 rounded-xl sm:rounded-2xl border transition-all cursor-pointer flex justify-between items-center ${color}">
                        <div class="flex-1">
                            <p class="text-base sm:text-lg font-black text-slate-800">${st.name}</p>
                            <p class="text-[9px] sm:text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">${st.enName}</p>
                        </div>
                        <span class="text-[10px] sm:text-xs font-bold text-slate-500 tabular">${status}</span>
                    </div>
                `;
            }).join('');
        };

        // AI 與資料庫管理
        window.runAITranslate = async () => {
            const area = document.getElementById('import-input');
            const text = area.value.trim();
            if(!text) return alert("請輸入站名");
            const btn = document.getElementById('ai-btn');
            const originalText = btn.innerText;
            btn.innerText = "翻譯中...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiApiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: `將以下公車站點清單翻譯為英文。必須嚴格遵循此格式輸出：「站名 [英文] 緯度 經度」，每站一行，不要提供標題或說明：\n\n${text}` }] }] 
                    })
                });
                const result = await response.json();
                area.value = result.candidates[0].content.parts[0].text.trim();
            } catch (e) { alert("AI 翻譯發生錯誤，請檢查網路或 API KEY"); }
            btn.innerText = originalText;
        };

        window.saveRoute = async () => {
            const name = document.getElementById('new-route-name').value;
            const input = document.getElementById('import-input').value;
            if(!name || !input) return alert("請填寫路線名稱與站點內容");
            const stations = input.split('\n').filter(l => l.trim()).map(line => {
                const matchEn = line.match(/\[(.*?)\]/);
                const enName = matchEn ? matchEn[1] : "";
                let clean = line.replace(/\[.*?\]/g, "").trim();
                const parts = clean.split(/\s+/);
                const lng = parseFloat(parts.pop());
                const lat = parseFloat(parts.pop());
                const sName = parts.join(' ').trim();
                return { name: sName, enName, lat, lng };
            });
            const data = { id: `r_${Date.now()}`, name, stations };
            const path = syncCode ? ['artifacts', appId, 'public', 'data', syncCode, data.id] : ['artifacts', appId, 'users', auth.currentUser.uid, 'routes', data.id];
            await setDoc(doc(db, ...path), data);
            switchTab('dashboard');
        };

        window.deleteRoute = async (id) => {
            if(!confirm("確定永久刪除此路線？")) return;
            const path = syncCode ? ['artifacts', appId, 'public', 'data', syncCode, id] : ['artifacts', appId, 'users', auth.currentUser.uid, 'routes', id];
            await deleteDoc(doc(db, ...path));
        };

        window.loadRoute = (i) => {
            currentRouteIdx = i; activeIdx = 0; lastAnnouncedType = ""; hasWelcomed = false;
            switchTab('dashboard'); updateDashboardUI();
        };

        window.jumpTo = (i) => { 
            activeIdx = i; lastAnnouncedType = 'next_'+i; 
            updateDashboardUI(); window.announceNext(); 
        };
        window.nextStation = () => { if(activeIdx < allRoutes[currentRouteIdx].stations.length-1) { activeIdx++; updateDashboardUI(); window.announceNext(); } };
        window.prevStation = () => { if(activeIdx > 0) { activeIdx--; updateDashboardUI(); } };

        // 介面切換
        window.switchTab = (t) => {
            ['dashboard', 'manager', 'settings'].forEach(k => {
                const el = document.getElementById(`tab-${k}`);
                if (el) el.classList.toggle('hidden', k !== t);
                const btn = document.getElementById(`nav-${k}`);
                if (btn) {
                    btn.classList.toggle('text-blue-600', k === t);
                    btn.classList.toggle('text-slate-400', k !== t);
                }
            });
            if(t === 'manager') renderRouteList();
        };

        const setupSync = (user) => {
            const path = syncCode ? ['artifacts', appId, 'public', 'data', syncCode] : ['artifacts', appId, 'users', user.uid, 'routes'];
            onSnapshot(collection(db, ...path), (snap) => {
                allRoutes = []; snap.forEach(d => allRoutes.push(d.data()));
                localStorage.setItem('bus_routes_v6', JSON.stringify(allRoutes));
                renderRouteList();
            });
        };

        const renderRouteList = () => {
            const grid = document.getElementById('route-grid');
            grid.innerHTML = allRoutes.map((r, i) => `
                <div class="bg-white p-4 sm:p-5 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm hover:shadow-md transition-all">
                    <div onclick="loadRoute(${i})" class="cursor-pointer flex-1">
                        <h4 class="text-base sm:text-lg font-black text-slate-800">${r.name}</h4>
                        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">${r.stations.length} 個站點數據</p>
                    </div>
                    <button onclick="deleteRoute('${r.id}')" class="text-red-300 hover:text-red-500 text-[10px] font-black uppercase px-4 py-2">刪除</button>
                </div>
            `).join('');
        };

        window.onload = async () => {
            onAuthStateChanged(auth, u => { if(u) setupSync(u); });
            await signInAnonymously(auth);
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #334155; }
        .tabular { font-variant-numeric: tabular-nums; }
        /* 隱藏捲軸但保留功能 */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="h-[100dvh] flex flex-col overflow-hidden">

    <!-- 頂部資訊看板 (響應式：手機上自動換行與縮放) -->
    <header class="px-4 py-4 sm:px-8 sm:py-5 flex flex-wrap justify-between items-center bg-white border-b border-slate-100 z-10 shrink-0 gap-4">
        <div class="flex items-center gap-4 sm:gap-10">
            <div>
                <p class="text-[8px] sm:text-[9px] font-black text-slate-300 uppercase tracking-widest mb-0.5 sm:mb-1">GPS 定位狀態</p>
                <div class="flex items-center gap-2 text-xs sm:text-sm font-bold text-slate-700">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> <span>已連線</span>
                </div>
            </div>
            <div class="w-px h-6 sm:h-8 bg-slate-100"></div>
            <div>
                <p class="text-[8px] sm:text-[9px] font-black text-slate-300 uppercase tracking-widest mb-0.5 sm:mb-1">目前時速</p>
                <div class="flex items-baseline gap-1">
                    <span id="dash-speed" class="text-xl sm:text-2xl font-black italic tabular text-slate-800">0</span>
                    <span class="text-[9px] sm:text-[10px] font-bold text-blue-500 uppercase">km/h</span>
                </div>
            </div>
        </div>
        <button id="gps-btn" onclick="toggleGPS()" class="w-full sm:w-auto bg-emerald-500 text-white px-6 py-3 sm:px-10 rounded-xl sm:rounded-2xl font-black text-xs shadow-lg shadow-emerald-50 active:scale-95 transition-all">啟動自動報站</button>
    </header>

    <main class="flex-1 flex overflow-hidden relative">
        
        <!-- Tab: 儀表板 (響應式：手機上下排版，平板/電腦左右分屏) -->
        <div id="tab-dashboard" class="w-full h-full flex flex-col lg:flex-row overflow-y-auto lg:overflow-hidden bg-slate-50/30">
            
            <!-- 左側/上方 大字報站 -->
            <div class="flex-1 p-6 lg:p-12 flex flex-col justify-center min-h-[50vh] lg:min-h-0 shrink-0">
                <div class="space-y-2 lg:space-y-3 text-center lg:text-left">
                    <div class="inline-block bg-blue-100 text-blue-600 px-3 py-1 lg:px-4 rounded-full text-[9px] lg:text-[10px] font-black uppercase tracking-[0.2em] mb-2 lg:mb-0">Next Station</div>
                    <h2 id="main-zh" class="text-5xl md:text-6xl lg:text-7xl xl:text-8xl font-black tracking-tighter text-slate-800 leading-tight">請載入路線</h2>
                    <p id="main-en" class="text-lg md:text-xl lg:text-2xl font-bold text-slate-300 uppercase tracking-widest italic break-words">Waiting for route data</p>
                </div>

                <div class="flex flex-col sm:flex-row items-center lg:items-end gap-6 lg:gap-10 mt-8 lg:mt-auto">
                    <!-- 距離卡片 -->
                    <div class="w-full sm:w-auto bg-white p-6 lg:p-8 rounded-[2rem] shadow-sm border border-slate-50 flex flex-col items-center min-w-[160px]">
                        <p class="text-[8px] lg:text-[9px] font-black text-slate-300 uppercase tracking-widest mb-1 lg:mb-2">距離目標</p>
                        <div class="flex items-baseline gap-2">
                            <span id="main-dist" class="text-4xl lg:text-5xl font-black text-slate-800 tabular">--</span>
                            <span class="text-sm lg:text-lg font-bold text-blue-400">M</span>
                        </div>
                    </div>

                    <!-- 控制按鈕區 -->
                    <div class="w-full sm:w-auto flex flex-col gap-3">
                        <div class="flex gap-2 justify-center lg:justify-start">
                            <button onclick="prevStation()" class="flex-1 sm:flex-none bg-white w-auto sm:w-14 h-12 sm:h-14 rounded-xl sm:rounded-2xl flex items-center justify-center text-lg shadow-sm border border-slate-50 hover:bg-slate-50 active:scale-95 transition-all">⏮</button>
                            <button onclick="nextStation()" class="flex-1 sm:flex-none bg-white w-auto sm:w-14 h-12 sm:h-14 rounded-xl sm:rounded-2xl flex items-center justify-center text-lg shadow-sm border border-slate-50 hover:bg-slate-50 active:scale-95 transition-all">⏭</button>
                        </div>
                        <div class="flex gap-2 lg:gap-3 justify-center lg:justify-start">
                            <button onclick="announceNext()" class="flex-1 sm:flex-none bg-slate-800 px-6 lg:px-8 h-12 lg:h-14 rounded-xl lg:rounded-2xl font-black text-white text-[10px] lg:text-[11px] shadow-sm active:scale-95 transition-all uppercase tracking-widest">📢 預報</button>
                            <button onclick="announceArrived()" class="flex-1 sm:flex-none bg-blue-500 px-6 lg:px-8 h-12 lg:h-14 rounded-xl lg:rounded-2xl font-black text-white text-[10px] lg:text-[11px] shadow-sm active:scale-95 transition-all uppercase tracking-widest">🔔 到站</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右側/下方 進度清單 -->
            <div class="w-full lg:w-[380px] xl:w-[420px] bg-white lg:border-l border-slate-100 p-6 lg:p-8 flex flex-col gap-4 lg:gap-6 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.05)] lg:shadow-2xl shrink-0 h-auto lg:h-full">
                <div class="flex justify-between items-center">
                    <h3 class="text-[9px] lg:text-[10px] font-black text-slate-400 tracking-widest uppercase italic">ETA 預估 (30km/h)</h3>
                    <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></span>
                </div>
                <!-- 列表滾動區域 -->
                <div id="station-list" class="flex-1 lg:overflow-y-auto space-y-3 lg:pr-2 min-h-[300px] lg:min-h-0">
                    <div class="h-full flex flex-col items-center justify-center text-slate-200 text-center space-y-4 pt-10 lg:pt-0">
                        <span class="text-4xl lg:text-5xl opacity-30">🚌</span>
                        <p class="font-bold text-[10px] lg:text-xs uppercase tracking-widest">請於管理頁面匯入數據</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: 路線管理 (響應式：上下或左右) -->
        <div id="tab-manager" class="hidden w-full h-full p-4 sm:p-6 lg:p-10 overflow-y-auto bg-slate-50/50">
            <div class="max-w-6xl mx-auto">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 sm:mb-10 gap-4">
                    <div>
                        <h2 class="text-2xl sm:text-3xl font-black text-slate-800 tracking-tighter uppercase mb-1">Data Center</h2>
                        <p class="text-[10px] sm:text-xs text-slate-400 font-bold uppercase tracking-widest">離線資料庫管理與 AI 翻譯</p>
                    </div>
                    <div class="flex w-full sm:w-auto gap-2 sm:gap-3">
                        <button id="ai-btn" onclick="runAITranslate()" class="flex-1 sm:flex-none bg-white border-2 border-slate-100 px-4 sm:px-6 py-3 rounded-xl sm:rounded-2xl font-black text-[10px] text-slate-500 hover:text-blue-500 active:scale-95 transition-all">AI 翻譯</button>
                        <button onclick="saveRoute()" class="flex-1 sm:flex-none bg-blue-600 px-6 sm:px-8 py-3 rounded-xl sm:rounded-2xl font-black text-[10px] text-white shadow-lg shadow-blue-50 active:scale-95 transition-all">儲存路線</button>
                    </div>
                </div>
                
                <div class="flex flex-col lg:flex-row gap-6 lg:gap-8">
                    <div class="flex-1 space-y-4 sm:space-y-5">
                        <input id="new-route-name" placeholder="路線名稱/編碼 (例如: 648 往台北車站)" class="w-full bg-white p-4 sm:p-5 rounded-xl sm:rounded-2xl border border-slate-100 outline-none font-black text-base sm:text-lg text-slate-700 shadow-sm">
                        <textarea id="import-input" rows="8" class="w-full bg-white p-4 sm:p-6 rounded-2xl sm:rounded-3xl border border-slate-100 outline-none font-mono text-xs leading-relaxed text-slate-600 shadow-sm resize-none" placeholder="輸入格式：&#10;站名 [英文] 緯度 經度&#10;景美 [Jingmei] 24.99 121.54"></textarea>
                        <div class="p-4 sm:p-5 bg-blue-50/50 rounded-xl sm:rounded-2xl border border-blue-100 text-[9px] sm:text-[10px] font-bold text-blue-500 tracking-wide uppercase leading-relaxed">
                            提示：座標資料可以從 Google Maps 右鍵取得，或使用站名後點擊「AI 翻譯」自動生成座標 (如有必要)。
                        </div>
                    </div>
                    <div class="w-full lg:w-[400px]">
                        <div id="route-grid" class="space-y-3"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: 系統設定 -->
        <div id="tab-settings" class="hidden w-full h-full p-6 lg:p-10 flex items-center justify-center bg-slate-50/50">
            <div class="bg-white p-8 sm:p-12 rounded-[2rem] sm:rounded-[3.5rem] shadow-xl border border-slate-50 w-full max-w-sm text-center">
                <div class="w-14 h-14 sm:w-16 sm:h-16 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-6">🌩️</div>
                <h3 class="text-lg sm:text-xl font-black text-slate-800 mb-2 uppercase tracking-tight">群組同步碼</h3>
                <p class="text-[9px] sm:text-[10px] text-slate-400 font-bold mb-6 sm:mb-8 leading-relaxed uppercase tracking-widest">與其他裝置輸入相同代碼<br>即可雲端共享路線資料庫</p>
                <input id="sync-input" placeholder="同步碼 (例如: TAIPEI_CORE)" class="w-full bg-slate-50 p-4 sm:p-5 rounded-xl sm:rounded-2xl text-center font-black text-base sm:text-lg outline-none mb-4 sm:mb-6 border-2 border-transparent focus:border-blue-100 transition-all">
                <button onclick="localStorage.setItem('bus_sync_v6', document.getElementById('sync-input').value); location.reload();" class="w-full bg-slate-800 py-4 rounded-xl sm:rounded-2xl font-black text-white text-[10px] tracking-widest uppercase shadow-xl shadow-slate-200 active:scale-95 transition-all">套用設定並重啟</button>
            </div>
        </div>

    </main>

    <!-- 底部導覽列 (通用化：固定在最下方) -->

        <button id="nav-manager" onclick="switchTab('manager')" class="flex flex-col items-center gap-1 sm:gap-1.5 text-slate-300 hover:text-slate-400 active:scale-95 transition-all w-20">
            <span class="text-lg sm:text-xl">🗺️</span>

        <button id="nav-settings" onclick="switchTab('settings')" class="flex flex-col items-center gap-1 sm:gap-1.5 text-slate-300 hover:text-slate-400 active:scale-95 transition-all w-20">
