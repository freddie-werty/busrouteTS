<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智慧 GPS 公車報站 (極簡版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, deleteDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const apiKey = ""; 
        let firebaseConfig = {  
            apiKey: "AIzaSyAZIM0cr-uhBtGyYd7_ddmmLH41h0PxBro",
            authDomain: "busts-a64c2.firebaseapp.com",
            projectId: "busts-a64c2",
            storageBucket: "busts-a64c2.firebasestorage.app",
            messagingSenderId: "684162202156",
            appId: "1:684162202156:web:b868e5b8341dd1c683af89"
        };
        
        try { if (typeof __firebase_config !== 'undefined') firebaseConfig = JSON.parse(__firebase_config); } catch (e) {}

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'bus-minimal-light';

        let allRoutes = JSON.parse(localStorage.getItem('bus_routes_min')) || [];
        let currentRouteIdx = -1;
        let activeIdx = 0;
        let isTracking = false;
        let watchId = null;
        let syncCode = localStorage.getItem('bus_sync_code_min') || "";
        let currentSpeed = 0;

        const speak = (text, lang) => {
            return new Promise((resolve) => {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = lang; u.rate = 1.0; u.onend = resolve;
                window.speechSynthesis.speak(u);
            });
        };

        const getDistance = (lat1, lon1, lat2, lon2) => {
            const R = 6371e3, p = Math.PI/180;
            const a = 0.5 - Math.cos((lat2-lat1)*p)/2 + Math.cos(lat1*p)*Math.cos(lat2*p)*(1-Math.cos((lon2-lon1)*p))/2;
            return R * 2 * Math.asin(Math.sqrt(a));
        };

        const calcETA = (meters) => Math.ceil((meters / 1000) / 30 * 60);

        window.toggleGPS = () => {
            const btn = document.getElementById('gps-btn');
            if (!isTracking) {
                isTracking = true;
                btn.innerText = "停止定位";
                btn.classList.replace('bg-blue-500', 'bg-red-400');
                watchId = navigator.geolocation.watchPosition(p => {
                    currentSpeed = Math.round((p.coords.speed || 0) * 3.6);
                    document.getElementById('dash-speed').innerText = currentSpeed;
                    updateLogic(p.coords.latitude, p.coords.longitude);
                }, null, { enableHighAccuracy: true });
            } else {
                isTracking = false;
                btn.innerText = "啟動定位";
                btn.classList.replace('bg-red-400', 'bg-blue-500');
                navigator.geolocation.clearWatch(watchId);
                document.getElementById('dash-speed').innerText = "0";
            }
        };

        const updateLogic = (lat, lon) => {
            if (currentRouteIdx === -1) return;
            const dist = getDistance(lat, lon, allRoutes[currentRouteIdx].stations[activeIdx].lat, allRoutes[currentRouteIdx].stations[activeIdx].lng);
            updateUI(dist);
        };

        window.updateUI = (currentDist = null) => {
            if (currentRouteIdx === -1) return;
            const route = allRoutes[currentRouteIdx];
            const s = route.stations[activeIdx];
            
            document.getElementById('main-zh').innerText = s.name;
            document.getElementById('main-en').innerText = s.enName || "";
            document.getElementById('main-dist').innerText = currentDist ? Math.round(currentDist) : "--";

            let accumulatedMeters = currentDist || 0;
            document.getElementById('station-list').innerHTML = route.stations.map((st, i) => {
                let etaText = "";
                let itemClass = "bg-slate-50 border-slate-100 opacity-60";
                if (i > activeIdx) {
                    accumulatedMeters += getDistance(route.stations[i-1].lat, route.stations[i-1].lng, st.lat, st.lng);
                    etaText = `${calcETA(accumulatedMeters)} 分鐘`;
                    itemClass = "bg-white border-slate-100";
                } else if (i === activeIdx) {
                    etaText = "即將抵達";
                    itemClass = "bg-blue-50 border-blue-200 ring-1 ring-blue-300 shadow-sm opacity-100";
                } else {
                    etaText = "已過站";
                }
                return `
                    <div onclick="jumpTo(${i})" class="p-5 rounded-2xl border ${itemClass} transition-all cursor-pointer flex justify-between items-center">
                        <div>
                            <p class="text-lg font-bold text-slate-800">${st.name}</p>
                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">${st.enName}</p>
                        </div>
                        <span class="text-xs font-bold text-slate-500">${etaText}</span>
                    </div>
                `;
            }).join('');
        };

        window.saveRoute = async () => {
            const name = document.getElementById('new-route-name').value;
            const input = document.getElementById('import-input').value;
            if(!name || !input) return;
            const stations = input.split('\n').filter(l => l.trim()).map(line => {
                const matchEn = line.match(/\[(.*?)\]/);
                const enName = matchEn ? matchEn[1] : "";
                let clean = line.replace(/\[.*?\]/g, "").trim();
                const parts = clean.split(/\s+/);
                const lng = parseFloat(parts.pop());
                const lat = parseFloat(parts.pop());
                return { name: parts.join(' ').trim(), enName, lat, lng };
            });
            const data = { id: `r_${Date.now()}`, name, stations };
            const path = syncCode ? ['artifacts', appId, 'public', 'data', syncCode, data.id] : ['artifacts', appId, 'users', auth.currentUser.uid, 'routes', data.id];
            await setDoc(doc(db, ...path), data);
            switchTab('dashboard');
        };

        window.deleteRoute = async (id) => {
            if(!confirm("確定刪除？")) return;
            const path = syncCode ? ['artifacts', appId, 'public', 'data', syncCode, id] : ['artifacts', appId, 'users', auth.currentUser.uid, 'routes', id];
            await deleteDoc(doc(db, ...path));
        };

        window.loadRoute = (i) => {
            currentRouteIdx = i; activeIdx = 0;
            switchTab('dashboard'); updateUI();
        };

        window.jumpTo = (i) => { activeIdx = i; updateUI(); };
        window.nextStation = () => { if(activeIdx < allRoutes[currentRouteIdx].stations.length-1) { activeIdx++; updateUI(); } };
        window.prevStation = () => { if(activeIdx > 0) { activeIdx--; updateUI(); } };

        window.switchTab = (t) => {
            ['dashboard', 'manager', 'settings'].forEach(k => {
                document.getElementById(`tab-${k}`).classList.toggle('hidden', k !== t);
                const btn = document.getElementById(`nav-${k}`);
                btn.classList.toggle('text-blue-500', k === t);
                btn.classList.toggle('text-slate-400', k !== t);
            });
            if(t === 'manager') renderRouteList();
        };

        const setupSync = (user) => {
            const path = syncCode ? ['artifacts', appId, 'public', 'data', syncCode] : ['artifacts', appId, 'users', user.uid, 'routes'];
            onSnapshot(collection(db, ...path), (snap) => {
                allRoutes = []; snap.forEach(d => allRoutes.push(d.data()));
                localStorage.setItem('bus_routes_min', JSON.stringify(allRoutes));
                renderRouteList();
            });
        };

        const renderRouteList = () => {
            document.getElementById('route-grid').innerHTML = allRoutes.map((r, i) => `
                <div class="bg-white p-6 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm hover:shadow-md transition-all">
                    <div onclick="loadRoute(${i})" class="cursor-pointer flex-1">
                        <h4 class="text-lg font-bold text-slate-800">${r.name}</h4>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">${r.stations.length} STATIONS</p>
                    </div>
                    <button onclick="deleteRoute('${r.id}')" class="text-red-300 hover:text-red-500 text-[10px] font-bold uppercase ml-4">Delete</button>
                </div>
            `).join('');
        };

        window.onload = async () => {
            onAuthStateChanged(auth, u => { if(u) setupSync(u); });
            await signInAnonymously(auth);
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fafbfc; color: #334155; }
        .tabular { font-variant-numeric: tabular-nums; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Top Info Bar -->
    <header class="p-6 flex justify-between items-center bg-white border-b border-slate-100">
        <div class="flex items-center gap-10">
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">System Status</p>
                <p class="text-xs font-bold text-green-500">定位追蹤中</p>
            </div>
            <div class="w-px h-6 bg-slate-100"></div>
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">現時時速</p>
                <p class="text-xl font-black italic tabular text-slate-800"><span id="dash-speed">0</span> <span class="text-[10px] text-blue-500 not-italic">KM/H</span></p>
            </div>
        </div>
        <button id="gps-btn" onclick="toggleGPS()" class="bg-blue-500 text-white px-8 py-3 rounded-2xl font-bold text-xs shadow-sm hover:bg-blue-600 transition-all">啟動定位</button>
    </header>

    <!-- Content Area -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Tab: Dashboard -->
        <div id="tab-dashboard" class="flex-1 flex overflow-hidden">
            <!-- Left: Hero View -->
            <div class="flex-1 p-10 flex flex-col justify-between">
                <div>
                    <p class="text-[10px] font-bold text-blue-400 tracking-[0.3em] uppercase mb-2">下一站 Upcoming</p>
                    <h2 id="main-zh" class="text-7xl font-black tracking-tighter text-slate-800">未選取路線</h2>
                    <p id="main-en" class="text-2xl font-bold text-slate-300 uppercase tracking-widest mt-2">Station Information</p>
                </div>

                <div class="flex items-end gap-12">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-50">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">距離剩餘 Distance</p>
                        <p class="text-4xl font-black text-slate-800 tabular"><span id="main-dist">--</span> <span class="text-base text-blue-400 font-normal">M</span></p>
                    </div>

                    <!-- Moderate Sized Controls -->
                    <div class="flex gap-3">
                        <button onclick="prevStation()" class="bg-slate-100 w-16 h-16 rounded-2xl flex items-center justify-center text-xl hover:bg-slate-200">⏮</button>
                        <button onclick="nextStation()" class="bg-slate-100 w-16 h-16 rounded-2xl flex items-center justify-center text-xl hover:bg-slate-200">⏭</button>
                        <button onclick="activeIdx > 0 && jumpTo(activeIdx)" class="bg-blue-500 px-8 h-16 rounded-2xl font-bold text-white shadow-md hover:bg-blue-600">重播報站</button>
                    </div>
                </div>
            </div>

            <!-- Right: Timeline -->
            <div class="w-[380px] bg-white border-l border-slate-100 p-6 flex flex-col gap-4">
                <p class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">預估抵達 (30km/h)</p>
                <div id="station-list" class="flex-1 overflow-y-auto space-y-3 pr-1">
                    <div class="h-full flex items-center justify-center text-slate-200 italic font-bold text-sm">請於 Manager 載入資料</div>
                </div>
            </div>
        </div>

        <!-- Tab: Manager -->
        <div id="tab-manager" class="hidden flex-1 p-10 overflow-y-auto">
            <div class="flex justify-between items-end mb-10">
                <h2 class="text-3xl font-black text-slate-800 tracking-tighter uppercase">Route Manager</h2>
                <button onclick="saveRoute()" class="bg-blue-500 px-6 py-3 rounded-2xl font-bold text-xs text-white">儲存路線</button>
            </div>
            <div class="grid grid-cols-2 gap-8">
                <div class="space-y-4">
                    <input id="new-route-name" placeholder="路線名稱" class="w-full bg-white p-4 rounded-2xl border border-slate-100 outline-none font-bold text-slate-700">
                    <textarea id="import-input" rows="10" class="w-full bg-white p-4 rounded-2xl border border-slate-100 outline-none font-mono text-xs leading-relaxed" placeholder="格式：站名 [英文] 緯度 經度"></textarea>
                </div>
                <div id="route-grid" class="space-y-3"></div>
            </div>
        </div>

        <!-- Tab: Settings -->
        <div id="tab-settings" class="hidden flex-1 p-10 flex items-center justify-center text-center">
            <div class="bg-white p-12 rounded-[3rem] shadow-sm border border-slate-50 w-full max-w-md">
                <h3 class="text-xl font-bold text-slate-800 mb-2">Fleet Sync</h3>
                <p class="text-xs text-slate-400 mb-8 font-bold">同步組碼 (Sync Code)</p>
                <input id="sync-input" placeholder="TAIPEI_BUS_01" class="w-full bg-slate-50 p-5 rounded-2xl text-center font-bold text-xl outline-none mb-6">
                <button onclick="localStorage.setItem('bus_sync_code_min', document.getElementById('sync-input').value); location.reload();" class="w-full bg-blue-500 py-4 rounded-2xl font-bold text-white shadow-lg shadow-blue-100">套用並更新</button>
            </div>
        </div>

    </main>

    <!-- Nav Bar -->
    <nav class="p-4 bg-white border-t border-slate-50 flex justify-around">
        <button id="nav-dashboard" onclick="switchTab('dashboard')" class="flex flex-col items-center text-blue-500 font-bold text-[10px] tracking-widest uppercase">
            <span class="text-lg mb-0.5">🏠</span> Dashboard
        </button>
        <button id="nav-manager" onclick="switchTab('manager')" class="flex flex-col items-center text-slate-400 font-bold text-[10px] tracking-widest uppercase">
            <span class="text-lg mb-0.5">📋</span> Manager
        </button>
        <button id="nav-settings" onclick="switchTab('settings')" class="flex flex-col items-center text-slate-400 font-bold text-[10px] tracking-widest uppercase">
            <span class="text-lg mb-0.5">⚙️</span> Sync
        </button>
    </nav>

</body>
</html>
