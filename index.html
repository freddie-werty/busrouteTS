<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智慧公車 GPS 報站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, deleteDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // ==========================================
        // 配置區
        // ==========================================
        const apiKey = "AIzaSyCj3QnqcghN1tBrZSxq-H3PWaU4xzYCk1A"; 
        let firebaseConfig = {  
            apiKey: "AIzaSyAZIM0cr-uhBtGyYd7_ddmmLH41h0PxBro",
            authDomain: "busts-a64c2.firebaseapp.com",
            projectId: "busts-a64c2",
            storageBucket: "busts-a64c2.firebasestorage.app",
            messagingSenderId: "684162202156",
            appId: "1:684162202156:web:b868e5b8341dd1c683af89"
        };
        
        try { if (typeof __firebase_config !== 'undefined') firebaseConfig = JSON.parse(__firebase_config); } catch (e) {}

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'bus-pro-v4';

        // 核心狀態
        let allRoutes = JSON.parse(localStorage.getItem('bus_routes_v4')) || [];
        let currentRouteIdx = -1;
        let activeIdx = 0;
        let isTracking = false;
        let watchId = null;
        let lastAnnouncedType = ""; // 'next_i' or 'arrived_i'
        let hasWelcomed = false; 
        let syncCode = localStorage.getItem('bus_sync_v4') || "";
        let currentSpeed = 0;

        // TTS 引擎
        const speak = (text, lang) => {
            return new Promise((resolve) => {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = lang; u.rate = 0.9; u.onend = resolve;
                window.speechSynthesis.speak(u);
            });
        };

        const playDing = () => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.3);
        };

        // 報站邏輯
        window.announceNext = async () => {
            if (currentRouteIdx === -1) return;
            const route = allRoutes[currentRouteIdx];
            const s = route.stations[activeIdx];
            window.speechSynthesis.cancel();

            // 離站 50m 後的歡迎邏輯
            if (activeIdx === 1 && !hasWelcomed) {
                await speak(`歡迎搭乘 ${route.name} 路線公車，祝您旅途愉快，一路平安。`, 'zh-TW');
                hasWelcomed = true;
                await new Promise(r => setTimeout(r, 800));
            }

            await speak(`下一站`, 'zh-TW');
            await speak(s.name, 'zh-TW');
            if(s.enName) {
                await speak(`Next station`, 'en-US');
                await speak(s.enName, 'en-US');
            }
        };

        window.announceArrived = async () => {
            if (currentRouteIdx === -1) return;
            const s = allRoutes[currentRouteIdx].stations[activeIdx];
            window.speechSynthesis.cancel();
            playDing();
            await new Promise(r => setTimeout(r, 500));
            
            // 格式：[中文] 到了 Arrive at [英文]
            await speak(s.name, 'zh-TW');
            await speak(`到了`, 'zh-TW');
            if(s.enName) {
                await speak(`Arrive at`, 'en-US');
                await speak(s.enName, 'en-US');
            }
        };

        // 距離計算與 ETA
        const getDistance = (lat1, lon1, lat2, lon2) => {
            const R = 6371e3, p = Math.PI/180;
            const a = 0.5 - Math.cos((lat2-lat1)*p)/2 + Math.cos(lat1*p)*Math.cos(lat2*p)*(1-Math.cos((lon2-lon1)*p))/2;
            return R * 2 * Math.asin(Math.sqrt(a));
        };

        const calcETA = (meters) => Math.ceil((meters / 1000) / 30 * 60);

        window.toggleGPS = () => {
            const btn = document.getElementById('gps-btn');
            if (!isTracking) {
                isTracking = true;
                btn.innerText = "停止自動報站";
                btn.classList.replace('bg-emerald-500', 'bg-red-400');
                watchId = navigator.geolocation.watchPosition(p => {
                    currentSpeed = Math.round((p.coords.speed || 0) * 3.6);
                    document.getElementById('dash-speed').innerText = currentSpeed;
                    updateGPSLogic(p.coords.latitude, p.coords.longitude);
                }, null, { enableHighAccuracy: true });
            } else {
                isTracking = false;
                btn.innerText = "啟動自動報站";
                btn.classList.replace('bg-red-400', 'bg-emerald-500');
                navigator.geolocation.clearWatch(watchId);
                document.getElementById('dash-speed').innerText = "0";
            }
        };

        const updateGPSLogic = (lat, lon) => {
            if (currentRouteIdx === -1) return;
            const route = allRoutes[currentRouteIdx];
            const target = route.stations[activeIdx];
            const dist = getDistance(lat, lon, target.lat, target.lng);
            
            updateDashboardUI(dist);

            // 到了：距離 60M 觸發
            if (dist < 60 && lastAnnouncedType !== 'arrived_' + activeIdx) {
                window.announceArrived();
                lastAnnouncedType = 'arrived_' + activeIdx;
            }

            // 下一站：播放過到了且離站超過 50M
            if (lastAnnouncedType === 'arrived_' + activeIdx && dist > 50) {
                if (activeIdx < route.stations.length - 1) {
                    activeIdx++;
                    lastAnnouncedType = 'next_' + activeIdx;
                    window.announceNext();
                    updateDashboardUI();
                }
            }
        };

        window.updateDashboardUI = (currentDist = null) => {
            if (currentRouteIdx === -1) return;
            const route = allRoutes[currentRouteIdx];
            const s = route.stations[activeIdx];
            
            document.getElementById('main-zh').innerText = s.name;
            document.getElementById('main-en').innerText = s.enName || "";
            document.getElementById('main-dist').innerText = currentDist ? Math.round(currentDist) : "--";

            let accumulatedMeters = currentDist || 0;
            const listContainer = document.getElementById('station-list');
            listContainer.innerHTML = route.stations.map((st, i) => {
                let status = "等待中";
                let color = "bg-white opacity-40 grayscale";
                if (i > activeIdx) {
                    accumulatedMeters += getDistance(route.stations[i-1].lat, route.stations[i-1].lng, st.lat, st.lng);
                    status = `預計 ${calcETA(accumulatedMeters)} 分`;
                    color = "bg-white border-slate-100 shadow-sm";
                } else if (i === activeIdx) {
                    status = "目前站點";
                    color = "bg-blue-50 border-blue-200 ring-4 ring-blue-50 shadow-md opacity-100";
                } else {
                    status = "已通過";
                }
                return `
                    <div onclick="jumpTo(${i})" class="p-5 rounded-2xl border transition-all cursor-pointer flex justify-between items-center ${color}">
                        <div class="flex-1">
                            <p class="text-xl font-black text-slate-800">${st.name}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">${st.enName}</p>
                        </div>
                        <span class="text-xs font-bold text-slate-500 tabular">${status}</span>
                    </div>
                `;
            }).join('');
        };

        // AI 翻譯 API
        window.runAITranslate = async () => {
            const area = document.getElementById('import-input');
            const text = area.value.trim();
            if(!text) return;
            const btn = document.getElementById('ai-btn');
            btn.innerText = "翻譯中...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `請將以下站點清單翻譯為英文，並嚴格按照格式「站名 [英文] 緯度 經度」輸出，每行一站，不要有其他文字：\n\n${text}` }] }] })
                });
                const result = await response.json();
                area.value = result.candidates[0].content.parts[0].text.trim();
            } catch (e) { alert("AI 翻譯錯誤，請檢查 API KEY"); }
            btn.innerText = "AI 翻譯站名";
        };

        window.saveRoute = async () => {
            const name = document.getElementById('new-route-name').value;
            const input = document.getElementById('import-input').value;
            if(!name || !input) return;
            const stations = input.split('\n').filter(l => l.trim()).map(line => {
                const matchEn = line.match(/\[(.*?)\]/);
                const enName = matchEn ? matchEn[1] : "";
                let clean = line.replace(/\[.*?\]/g, "").trim();
                const parts = clean.split(/\s+/);
                const lng = parseFloat(parts.pop());
                const lat = parseFloat(parts.pop());
                const sName = parts.join(' ').trim();
                return { name: sName, enName, lat, lng };
            });
            const data = { id: `r_${Date.now()}`, name, stations };
            const path = syncCode ? ['artifacts', appId, 'public', 'data', syncCode, data.id] : ['artifacts', appId, 'users', auth.currentUser.uid, 'routes', data.id];
            await setDoc(doc(db, ...path), data);
            switchTab('dashboard');
        };

        window.deleteRoute = async (id) => {
            if(!confirm("確定永久刪除此路線？")) return;
            const path = syncCode ? ['artifacts', appId, 'public', 'data', syncCode, id] : ['artifacts', appId, 'users', auth.currentUser.uid, 'routes', id];
            await deleteDoc(doc(db, ...path));
        };

        window.loadRoute = (i) => {
            currentRouteIdx = i; activeIdx = 0; lastAnnouncedType = ""; hasWelcomed = false;
            switchTab('dashboard'); updateDashboardUI();
        };

        window.jumpTo = (i) => { 
            activeIdx = i; lastAnnouncedType = 'next_'+i; 
            updateDashboardUI(); window.announceNext(); 
        };
        window.nextStation = () => { if(activeIdx < allRoutes[currentRouteIdx].stations.length-1) { activeIdx++; updateDashboardUI(); window.announceNext(); } };
        window.prevStation = () => { if(activeIdx > 0) { activeIdx--; updateDashboardUI(); } };

        window.switchTab = (t) => {
            ['dashboard', 'manager', 'settings'].forEach(k => {
                const el = document.getElementById(`tab-${k}`);
                if (el) el.classList.toggle('hidden', k !== t);
                const btn = document.getElementById(`nav-${k}`);
                if (btn) {
                    btn.classList.toggle('text-blue-600', k === t);
                    btn.classList.toggle('text-slate-400', k !== t);
                }
            });
            if(t === 'manager') renderRouteList();
        };

        const setupSync = (user) => {
            const path = syncCode ? ['artifacts', appId, 'public', 'data', syncCode] : ['artifacts', appId, 'users', user.uid, 'routes'];
            onSnapshot(collection(db, ...path), (snap) => {
                allRoutes = []; snap.forEach(d => allRoutes.push(d.data()));
                localStorage.setItem('bus_routes_v4', JSON.stringify(allRoutes));
                renderRouteList();
            }, (e) => console.log(e));
        };

        const renderRouteList = () => {
            const grid = document.getElementById('route-grid');
            grid.innerHTML = allRoutes.map((r, i) => `
                <div class="bg-white p-6 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm hover:shadow-md transition-all">
                    <div onclick="loadRoute(${i})" class="cursor-pointer flex-1">
                        <h4 class="text-xl font-black text-slate-800">${r.name}</h4>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">${r.stations.length} 個站點數據</p>
                    </div>
                    <button onclick="deleteRoute('${r.id}')" class="bg-red-50 text-red-400 text-[10px] font-black uppercase px-4 py-2 rounded-xl hover:bg-red-100">刪除</button>
                </div>
            `).join('');
        };

        window.onload = async () => {
            onAuthStateChanged(auth, u => { if(u) setupSync(u); });
            await signInAnonymously(auth);
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fbfcfe; color: #334155; }
        .tabular { font-variant-numeric: tabular-nums; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- 頂部資訊列：儀表風格 -->
    <header class="px-10 py-6 flex justify-between items-center bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div class="flex items-center gap-12">
            <div>
                <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-1">GPS 定位狀態</p>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                    <span class="text-sm font-black text-slate-700">ACTIVE 定位中</span>
                </div>
            </div>
            <div class="w-px h-8 bg-slate-100"></div>
            <div>
                <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-1">即時時速</p>
                <div class="flex items-baseline gap-1">
                    <span id="dash-speed" class="text-3xl font-black italic tabular text-slate-800">0</span>
                    <span class="text-[11px] font-bold text-blue-500 uppercase">km/h</span>
                </div>
            </div>
        </div>
        <button id="gps-btn" onclick="toggleGPS()" class="bg-emerald-500 text-white px-10 py-4 rounded-2xl font-black text-xs shadow-lg shadow-emerald-100 hover:scale-105 transition-transform active:scale-95">啟動自動報站</button>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <!-- Tab: 儀表板 -->
        <div id="tab-dashboard" class="flex-1 flex overflow-hidden">
            <!-- 左側大字報站區 -->
            <div class="flex-1 p-16 flex flex-col justify-between">
                <div class="space-y-4">
                    <div class="inline-block bg-blue-100 text-blue-600 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Upcoming Station</div>
                    <h2 id="main-zh" class="text-8xl font-black tracking-tighter text-slate-800 leading-none">請載入路線</h2>
                    <p id="main-en" class="text-3xl font-bold text-slate-300 uppercase tracking-widest italic leading-tight">Waiting for data</p>
                </div>

                <div class="flex items-end gap-12">
                    <div class="bg-white p-10 rounded-[3rem] shadow-xl shadow-slate-200/50 border border-slate-50 flex flex-col items-center min-w-[200px]">
                        <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-2">距離站點</p>
                        <div class="flex items-baseline gap-2">
                            <span id="main-dist" class="text-6xl font-black text-slate-800 tabular">--</span>
                            <span class="text-xl font-bold text-blue-400">M</span>
                        </div>
                    </div>

                    <div class="flex flex-col gap-4">
                        <div class="flex gap-3">
                            <button onclick="prevStation()" class="bg-white w-16 h-16 rounded-3xl flex items-center justify-center text-xl shadow-sm border border-slate-50 hover:bg-slate-50 transition-colors">⏮</button>
                            <button onclick="nextStation()" class="bg-white w-16 h-16 rounded-3xl flex items-center justify-center text-xl shadow-sm border border-slate-50 hover:bg-slate-50 transition-colors">⏭</button>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="announceNext()" class="bg-slate-800 px-10 h-16 rounded-[2rem] font-black text-white text-xs shadow-lg shadow-slate-200 hover:bg-slate-700 active:scale-95 transition-all">📢 手動預報</button>
                            <button onclick="announceArrived()" class="bg-blue-500 px-10 h-16 rounded-[2rem] font-black text-white text-xs shadow-lg shadow-blue-100 hover:bg-blue-600 active:scale-95 transition-all">🔔 到站廣播</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右側站點進度條 -->
            <div class="w-[420px] bg-white border-l border-slate-100 p-10 flex flex-col gap-8 shadow-2xl shadow-slate-200/50">
                <div class="flex justify-between items-center">
                    <h3 class="text-[10px] font-black text-slate-400 tracking-widest uppercase italic">預計抵達 (30km/h)</h3>
                    <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                </div>
                <div id="station-list" class="flex-1 overflow-y-auto space-y-4 pr-2">
                    <div class="h-full flex flex-col items-center justify-center text-slate-300 space-y-4 opacity-50">
                        <span class="text-4xl">🚌</span>
                        <p class="font-black text-xs tracking-widest uppercase">請先於路線管理分頁匯入數據</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: 路線管理 -->
        <div id="tab-manager" class="hidden flex-1 p-12 overflow-y-auto bg-slate-50/50">
            <div class="max-w-6xl mx-auto">
                <div class="flex justify-between items-end mb-12">
                    <div>
                        <h2 class="text-4xl font-black text-slate-800 tracking-tighter uppercase mb-2">Routes Management</h2>
                        <p class="text-sm text-slate-400 font-bold uppercase tracking-widest">建立與管理您的離線報站資料庫</p>
                    </div>
                    <div class="flex gap-3">
                        <button id="ai-btn" onclick="runAITranslate()" class="bg-white border-2 border-slate-100 px-8 py-4 rounded-2xl font-black text-xs text-slate-500 hover:border-blue-200 hover:text-blue-500 transition-all">AI 翻譯站名</button>
                        <button onclick="saveRoute()" class="bg-blue-600 px-10 py-4 rounded-2xl font-black text-xs text-white shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all">儲存路線</button>
                    </div>
                </div>
                
                <div class="grid grid-cols-12 gap-10">
                    <div class="col-span-7 space-y-6">
                        <div class="bg-white p-2 rounded-[2rem] shadow-sm border border-slate-100">
                            <input id="new-route-name" placeholder="路線編碼與方向 (例如: 648 往 台北車站)" class="w-full bg-transparent p-6 rounded-2xl outline-none font-black text-xl text-slate-700">
                        </div>
                        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                            <textarea id="import-input" rows="12" class="w-full bg-slate-50 p-6 rounded-2xl outline-none font-mono text-sm leading-loose text-slate-600" placeholder="格式範例：&#10;站名 [英文] 緯度 經度&#10;民權西路 [Minquan W. Rd.] 25.06 121.51"></textarea>
                            <p class="mt-4 text-[10px] text-slate-300 font-black tracking-widest uppercase italic">注意：緯度與經度請使用空格分隔，英文站名請使用中括號包裹。</p>
                        </div>
                    </div>
                    <div class="col-span-5">
                        <div id="route-grid" class="space-y-4"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: 設定 -->
        <div id="tab-settings" class="hidden flex-1 p-12 flex items-center justify-center">
            <div class="bg-white p-16 rounded-[4rem] shadow-2xl shadow-slate-200 border border-slate-50 w-full max-w-md text-center">
                <div class="w-20 h-20 bg-blue-50 text-blue-500 rounded-3xl flex items-center justify-center text-3xl mx-auto mb-8">☁️</div>
                <h3 class="text-2xl font-black text-slate-800 mb-2 uppercase tracking-tight">雲端同步設定</h3>
                <p class="text-sm text-slate-400 font-bold mb-10 leading-relaxed">輸入同步碼可於不同裝置間<br>共用您的路線清單。</p>
                <input id="sync-input" placeholder="輸入您的同步代碼" class="w-full bg-slate-50 p-6 rounded-2xl text-center font-black text-2xl outline-none mb-6 border-2 border-transparent focus:border-blue-100 transition-all">
                <button onclick="localStorage.setItem('bus_sync_v4', document.getElementById('sync-input').value); location.reload();" class="w-full bg-slate-800 py-5 rounded-2xl font-black text-white text-xs tracking-widest uppercase shadow-xl shadow-slate-200 active:scale-95 transition-all">儲存並重新載入</button>
            </div>
        </div>

    </main>

    <!-- 底部導覽 -->
    <nav class="px-10 py-6 bg-white border-t border-slate-50 flex justify-around items-center">
        <button id="nav-dashboard" onclick="switchTab('dashboard')" class="flex flex-col items-center gap-2 text-blue-600 transition-all">
            <span class="text-xl">📊</span>
            <span class="font-black text-[10px] tracking-widest uppercase">報站儀表</span>
        </button>
        <button id="nav-manager" onclick="switchTab('manager')" class="flex flex-col items-center gap-2 text-slate-400 transition-all">
            <span class="text-xl">🗺️</span>
            <span class="font-black text-[10px] tracking-widest uppercase">路線管理</span>
        </button>
        <button id="nav-settings" onclick="switchTab('settings')" class="flex flex-col items-center gap-2 text-slate-400 transition-all">
            <span class="text-xl">⚙️</span>
            <span class="font-black text-[10px] tracking-widest uppercase">系統設定</span>
        </button>
    </nav>

</body>
</html>
